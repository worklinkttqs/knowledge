<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLink TTQS 智慧知識庫</title>
<style>
  :root {
    --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-600: #534AB7; --purple-800: #3C3489;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --amber-800: #633806;
    --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    --pink-50: #FBEAF0; --pink-600: #993556; --pink-800: #72243E;
    --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
    --green-50: #EAF3DE; --green-600: #3B6D11; --green-800: #27500A;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A; --gray-800: #444441;
    --bg: #ffffff; --bg-sec: #F8F8F6; --bg-ter: #F1EFE8;
    --text: #1a1a18; --text-sec: #5F5E5A; --text-ter: #888780;
    --border: rgba(0,0,0,0.12); --border-sec: rgba(0,0,0,0.22);
    --radius: 10px; --radius-lg: 14px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: var(--bg-ter); color: var(--text); font-size: 15px; line-height: 1.6; }

  /* ── Header ── */
  header { background: var(--purple-600); color: #fff; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(83,74,183,0.3); }
  header .logo { font-size: 20px; font-weight: 600; letter-spacing: .02em; }
  header .logo span { opacity: .65; font-weight: 400; font-size: 14px; margin-left: 8px; }
  header .badge { margin-left: auto; font-size: 12px; background: rgba(255,255,255,.18); padding: 4px 12px; border-radius: 20px; }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 62px); }
  aside { background: var(--bg); border-right: 0.5px solid var(--border); padding: 1.5rem 1rem; position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto; }
  main { padding: 1.5rem; }

  /* ── Sidebar ── */
  .sidebar-label { font-size: 11px; font-weight: 600; color: var(--text-ter); text-transform: uppercase; letter-spacing: .06em; margin: 1.25rem 0 .5rem; padding: 0 .5rem; }
  .sidebar-label:first-child { margin-top: 0; }
  .nav-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border-radius: 8px; border: none; background: none; cursor: pointer; font-size: 13.5px; color: var(--text-sec); text-align: left; transition: background .12s, color .12s; }
  .nav-btn:hover { background: var(--bg-sec); color: var(--text); }
  .nav-btn.active { background: var(--purple-50); color: var(--purple-800); font-weight: 500; }
  .nav-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-P { background: var(--purple-600); }
  .dot-D1 { background: var(--teal-600); }
  .dot-D2 { background: var(--teal-800); }
  .dot-R { background: #BA7517; }
  .dot-O { background: var(--blue-600); }
  .dot-phase1 { background: #7F77DD; }
  .dot-phase2 { background: #1D9E75; }
  .dot-phase3 { background: #BA7517; }

  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border-radius: var(--radius); border: 0.5px solid var(--border-sec); background: var(--bg); font-size: 14px; color: var(--text); outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--purple-600); }
  .search-wrap .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-ter); }

  /* ── Main content ── */
  .view-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .view-title { font-size: 18px; font-weight: 500; }
  .view-count { font-size: 13px; color: var(--text-ter); background: var(--bg-sec); padding: 2px 10px; border-radius: 20px; }

  .section-group { margin-bottom: 1.5rem; }
  .section-head { font-size: 12px; font-weight: 600; color: var(--text-ter); text-transform: uppercase; letter-spacing: .05em; padding: .5rem 0; margin-bottom: .5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .section-head .color-bar { width: 3px; height: 14px; border-radius: 2px; }

  /* ── Doc cards ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .doc-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: .875rem 1rem; transition: border-color .15s, box-shadow .15s; position: relative; }
  .doc-card:hover { border-color: var(--purple-200); box-shadow: var(--shadow); }
  .doc-card.has-link { cursor: pointer; }
  .doc-card.has-link:hover .card-name { color: var(--purple-800); }
  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .tier-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .tier-M { background: var(--purple-50); color: var(--purple-800); }
  .tier-P { background: var(--teal-50); color: var(--teal-800); }
  .tier-S { background: var(--amber-50); color: var(--amber-800); }
  .tier-QR { background: var(--blue-50); color: var(--blue-800); }
  .tier-F { background: var(--pink-50); color: var(--pink-800); }
  .card-name { font-size: 13px; line-height: 1.45; color: var(--text); flex: 1; transition: color .15s; }
  .card-meta { display: flex; gap: 5px; flex-wrap: wrap; }
  .meta-tag { font-size: 11px; padding: 2px 7px; border-radius: 8px; background: var(--bg-sec); color: var(--text-sec); }
  .link-icon { position: absolute; top: 10px; right: 10px; font-size: 13px; color: var(--text-ter); opacity: 0; transition: opacity .15s; }
  .doc-card.has-link:hover .link-icon { opacity: 1; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-ter); font-size: 14px; }

  /* ── AI Chat ── */
  .chat-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-top: 1.5rem; }
  .chat-title { font-size: 14px; font-weight: 500; color: var(--text-sec); margin-bottom: .875rem; display: flex; align-items: center; gap: 6px; }
  .quick-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .75rem; }
  .quick-chip { font-size: 12px; padding: 5px 11px; border-radius: 16px; border: 0.5px solid var(--border-sec); background: var(--bg); color: var(--text-sec); cursor: pointer; transition: border-color .12s, color .12s, background .12s; }
  .quick-chip:hover { border-color: var(--purple-600); color: var(--purple-800); background: var(--purple-50); }
  .chat-row { display: flex; gap: 8px; }
  .chat-row input { flex: 1; padding: 10px 14px; border-radius: var(--radius); border: 0.5px solid var(--border-sec); font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color .15s; }
  .chat-row input:focus { border-color: var(--purple-600); }
  .chat-row button { padding: 10px 18px; border-radius: var(--radius); background: var(--purple-600); color: #fff; border: none; font-size: 13px; cursor: pointer; transition: background .15s; white-space: nowrap; }
  .chat-row button:hover { background: var(--purple-800); }

  /* ── Legend ── */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-sec); }
  .legend-pill { font-size: 11px; padding: 1px 7px; border-radius: 8px; }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 1rem; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* ── Config block (hidden by default) ── */
  .config-note { font-size: 12px; color: var(--text-ter); background: var(--amber-50); border: 0.5px solid #FAC775; border-radius: 8px; padding: .625rem .875rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">WorkLink <span>沃領客 TTQS 智慧知識庫</span></div>
  <div class="badge">評核版 v1.0</div>
</header>

<div class="layout">
  <!-- ── Sidebar ── -->
  <aside>
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="sideSearch" placeholder="搜尋文件..." oninput="handleSearch(this.value)">
    </div>

    <div class="sidebar-label">課程階段</div>
    <button class="nav-btn active" onclick="setView('phase','all')" id="nav-phase-all">
      <span class="dot" style="background:var(--purple-200)"></span> 全部文件
    </button>
    <button class="nav-btn" onclick="setView('phase','課前')" id="nav-phase-課前">
      <span class="dot dot-phase1"></span> 課前作業
    </button>
    <button class="nav-btn" onclick="setView('phase','課中')" id="nav-phase-課中">
      <span class="dot dot-phase2"></span> 課中執行
    </button>
    <button class="nav-btn" onclick="setView('phase','課後')" id="nav-phase-課後">
      <span class="dot dot-phase3"></span> 課後查核
    </button>

    <div class="sidebar-label">PDDRO 循環</div>
    <button class="nav-btn" onclick="setView('pddro','P')" id="nav-pddro-P">
      <span class="dot dot-P"></span> P 計畫 Plan
    </button>
    <button class="nav-btn" onclick="setView('pddro','D設計')" id="nav-pddro-D設計">
      <span class="dot dot-D1"></span> D 設計 Design
    </button>
    <button class="nav-btn" onclick="setView('pddro','D執行')" id="nav-pddro-D執行">
      <span class="dot dot-D2"></span> D 執行 Do
    </button>
    <button class="nav-btn" onclick="setView('pddro','R')" id="nav-pddro-R">
      <span class="dot dot-R"></span> R 查核 Review
    </button>
    <button class="nav-btn" onclick="setView('pddro','O')" id="nav-pddro-O">
      <span class="dot dot-O"></span> O 成果 Outcome
    </button>

    <div class="sidebar-label">TTQS 指標</div>
    <button class="nav-btn" onclick="setView('indicator','P')" id="nav-ind-P" style="font-weight:500;color:var(--purple-800)">【P】計畫 指標 01–06</button>
    <button class="nav-btn" onclick="setView('indicator','D')" id="nav-ind-D" style="font-weight:500;color:var(--teal-800)">【D】設計+執行 07–14</button>
    <button class="nav-btn" onclick="setView('indicator','R')" id="nav-ind-R" style="font-weight:500;color:var(--amber-600)">【R】查核 指標 15–16</button>
    <button class="nav-btn" onclick="setView('indicator','O')" id="nav-ind-O" style="font-weight:500;color:var(--blue-800)">【O】成果 指標 17–19</button>

    <div class="sidebar-label">四階文件</div>
    <button class="nav-btn" onclick="setView('tier','M')" id="nav-tier-M">
      <span class="tier-pill tier-M">手冊</span> 第一階
    </button>
    <button class="nav-btn" onclick="setView('tier','P')" id="nav-tier-P">
      <span class="tier-pill tier-P">程序</span> 第二階
    </button>
    <button class="nav-btn" onclick="setView('tier','S')" id="nav-tier-S">
      <span class="tier-pill tier-S">辦法</span> 第三階
    </button>
    <button class="nav-btn" onclick="setView('tier','QR')" id="nav-tier-QR">
      <span class="tier-pill tier-QR">佐證</span> 第四階
    </button>
    <button class="nav-btn" onclick="setView('tier','F')" id="nav-tier-F">
      <span class="tier-pill tier-F">表單</span> 附件
    </button>
  </aside>

  <!-- ── Main ── -->
  <main>
    <div class="config-note" id="configNote">
      💡 <span>文件連結尚未設定：請在此頁面原始碼頂部的 <code>DRIVE_LINKS</code> 區塊填入 Google Drive 網址，儲存後即自動生效。</span>
    </div>

    <div class="view-header">
      <div class="view-title" id="viewTitle">全部文件</div>
      <div class="view-count" id="viewCount"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-pill tier-M tier-M">手冊</span> 第一階</div>
      <div class="legend-item"><span class="legend-pill tier-P tier-P">程序</span> 第二階</div>
      <div class="legend-item"><span class="legend-pill tier-S tier-S">辦法</span> 第三階</div>
      <div class="legend-item"><span class="legend-pill tier-QR tier-QR">佐證</span> 第四階</div>
      <div class="legend-item"><span class="legend-pill tier-F tier-F">表單</span> 附件</div>
    </div>

    <div id="docArea"></div>

    <!-- ── AI Chat ── -->
    <div class="chat-panel">
      <div class="chat-title">🤖 智慧小幫手 — 直接提問找文件</div>
      <div class="quick-row">
        <div class="quick-chip" onclick="askClaude('課後我要填什麼表？')">課後要填什麼表？</div>
        <div class="quick-chip" onclick="askClaude('課前需要準備哪些文件？')">課前要準備什麼？</div>
        <div class="quick-chip" onclick="askClaude('指標16異常矯正需要哪些佐證？')">指標16需要什麼佐證？</div>
        <div class="quick-chip" onclick="askClaude('CAPA計畫相關文件有哪些？')">CAPA相關文件？</div>
        <div class="quick-chip" onclick="askClaude('師資遴選要看哪個文件？')">師資遴選文件？</div>
        <div class="quick-chip" onclick="askClaude('新進同仁第一天要看什麼？')">新進同仁指引？</div>
      </div>
      <div class="chat-row">
        <input type="text" id="chatInput" placeholder="直接提問，例如：訓練計畫差異分析要用哪個表？" onkeydown="if(event.key==='Enter') askClaude()">
        <button onclick="askClaude()">問 AI ↗</button>
      </div>
    </div>
  </main>
</div>

<script>

  'WL-P-04-01': 'https://drive.google.com/open?id=18LP21xlDLW-9yqmnHDBphEWvxAvZtsAx&usp=drive_copy',   // 異常矯正、CAPA與持續改善程序書

  'WL-S-02-01': 'https://drive.google.com/open?id=1sW2inhT5Y476fAcj8_XIyTxSQVjGWKlr&usp=drive_copy',   // 訓練計畫與課程設計辦法

let currentView = {type:'phase', value:'all'};
let searchQ = '';

function hasLink(id) { return !!(DRIVE_LINKS[id] && DRIVE_LINKS[id].trim()); }
function hasAnyLink() { return Object.values(DRIVE_LINKS).some(v => v && v.trim()); }

function openDoc(id) {
  const url = DRIVE_LINKS[id];
  if (url && url.trim()) { window.open(url, '_blank'); }
}

function cardHTML(doc) {
  const link = hasLink(doc.id);
  const indStr = doc.ind.slice(0,4).map(i=>`指標${i}`).join('、') + (doc.ind.length>4?' …':'');
  const phaseStr = doc.phase.join(' · ');
  return `<div class="doc-card ${link ? 'has-link' : ''}" onclick="${link ? `openDoc('${doc.id}')` : ''}">
    ${link ? '<span class="link-icon">↗</span>' : ''}
    <div class="card-top">
      <span class="tier-pill tier-${doc.tier}">${TIER_LABELS[doc.tier]}</span>
      <span class="card-name">${doc.id} — ${doc.name}</span>
    </div>
    <div class="card-meta">
      <span class="meta-tag">📋 ${phaseStr}</span>
      <span class="meta-tag">📌 ${indStr}</span>
    </div>
  </div>`;
}

function groupRender(groups) {
  return groups.map(({label, color, docs}) => {
    if (!docs.length) return '';
    return `<div class="section-group">
      <div class="section-head">
        <div class="color-bar" style="background:${color}"></div>
        ${label} <span style="font-weight:400;margin-left:4px">(${docs.length} 份)</span>
      </div>
      <div class="cards-grid">${docs.map(cardHTML).join('')}</div>
    </div>`;
  }).join('');
}

function applySearch(list) {
  if (!searchQ) return list;
  const q = searchQ.toLowerCase();
  return list.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.id.toLowerCase().includes(q) ||
    d.ind.some(i => String(i) === q || ('指標'+i).includes(q)) ||
    d.phase.some(p => p.includes(q)) ||
    d.pddro.some(s => s.toLowerCase().includes(q)) ||
    (TIER_LABELS[d.tier]||'').includes(q)
  );
}

function render() {
  const {type, value} = currentView;
  let filtered = applySearch(DOCS);
  let title = '全部文件';
  let html = '';

  if (type === 'phase') {
    if (value !== 'all') {
      filtered = filtered.filter(d => d.phase.includes(value));
      title = {課前:'📋 課前作業', 課中:'🎓 課中執行', 課後:'📊 課後查核'}[value] || value;
      html = `<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
    } else {
      title = '全部文件';
      html = groupRender([
        {label:'📋 課前作業', color:SECTION_COLORS['課前'], docs: filtered.filter(d=>d.phase.includes('課前'))},
        {label:'🎓 課中執行', color:SECTION_COLORS['課中'], docs: filtered.filter(d=>d.phase.includes('課中'))},
        {label:'📊 課後查核', color:SECTION_COLORS['課後'], docs: filtered.filter(d=>d.phase.includes('課後'))},
      ]);
    }
  } else if (type === 'pddro') {
    filtered = filtered.filter(d => d.pddro.includes(value));
    const labels = {P:'P 計畫 Plan', D設計:'D 設計 Design', D執行:'D 執行 Do', R:'R 查核 Review', O:'O 成果 Outcome'};
    title = labels[value] || value;
    html = `<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
  } else if (type === 'indicator') {
    const ranges = {P:[1,2,3,4,5,6], D:[7,8,9,10,11,12,13,14], R:[15,16], O:[17,18,19]};
    const inds = ranges[value] || [];
    title = {P:'【P 計畫】指標 01–06', D:'【D 設計+執行】指標 07–14', R:'【R 查核】指標 15–16', O:'【O 成果】指標 17–19'}[value];
    const groups = inds.map(i => ({
      label: `指標 ${String(i).padStart(2,'0')} — ${IND_NAMES[i]}`,
      color: {P:'#534AB7',D:'#1D9E75',R:'#BA7517',O:'#185FA5'}[value],
      docs: filtered.filter(d => d.ind.includes(i))
    }));
    html = groupRender(groups);
  } else if (type === 'tier') {
    filtered = filtered.filter(d => d.tier === value);
    const labels = {M:'第一階 手冊 (Manual)', P:'第二階 程序 (Procedure)', S:'第三階 管理辦法 (Standard)', QR:'第四階 佐證紀錄 (Quality Record)', F:'附件 表單 (Form)'};
    title = labels[value] || value;
    html = `<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
  }

  if (searchQ) title = `搜尋：「${searchQ}」`;
  if (!filtered.length) html = `<div class="empty">找不到符合條件的文件，請換個關鍵字試試。</div>`;

  document.getElementById('viewTitle').textContent = title;
  document.getElementById('viewCount').textContent = `${filtered.length} 份文件`;
  document.getElementById('docArea').innerHTML = html;
  document.getElementById('configNote').style.display = hasAnyLink() ? 'none' : 'flex';
}

function setView(type, value) {
  currentView = {type, value};
  searchQ = '';
  document.getElementById('sideSearch').value = '';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const key = type === 'phase' ? `nav-phase-${value}` : type === 'pddro' ? `nav-pddro-${value}` : type === 'indicator' ? `nav-ind-${value}` : `nav-tier-${value}`;
  const btn = document.getElementById(key);
  if (btn) btn.classList.add('active');
  render();
}

function handleSearch(val) {
  searchQ = val.trim();
  currentView = {type:'phase', value:'all'};
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-phase-all').classList.add('active');
  render();
}

function askClaude(q) {
  const input = document.getElementById('chatInput');
  const query = q || input.value.trim();
  if (!query) return;
  const context = `你是 WorkLink 沃領客的 TTQS 內部知識庫助理。請根據以下問題，找出相關的文件、表單，並說明在哪個 TTQS 指標與課程階段（課前/課中/課後）需要用到。問題：${query}`;
  const url = 'https://claude.ai/new?q=' + encodeURIComponent(context);
  window.open(url, '_blank');
}

render();
</script>
