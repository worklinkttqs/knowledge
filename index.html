<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLink TTQS 智慧知識庫</title>
<style>
  :root {
    --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-600: #534AB7; --purple-800: #3C3489;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --amber-800: #633806;
    --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    --pink-50: #FBEAF0; --pink-600: #993556; --pink-800: #72243E;
    --bg: #ffffff; --bg-sec: #F8F8F6; --bg-ter: #F1EFE8;
    --text: #1a1a18; --text-sec: #5F5E5A; --text-ter: #888780;
    --border: rgba(0,0,0,0.12); --border-sec: rgba(0,0,0,0.22);
    --radius: 12px; --radius-lg: 16px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: var(--bg-ter); color: var(--text); font-size: 17px; line-height: 1.7; }

  /* ── Header ── */
  header { background: var(--purple-600); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(83,74,183,0.3); }
  header .logo { font-size: 20px; font-weight: 600; letter-spacing: .02em; }
  header .logo span { opacity: .7; font-weight: 400; font-size: 15px; margin-left: 8px; }
  header .badge { margin-left: auto; font-size: 13px; background: rgba(255,255,255,.18); padding: 4px 12px; border-radius: 20px; white-space: nowrap; }

  /* ── Desktop layout ── */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 64px); }

  /* ── Desktop Sidebar ── */
  aside { background: var(--bg); border-right: 0.5px solid var(--border); padding: 1.5rem 1rem; position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; }
  .sidebar-label { font-size: 12px; font-weight: 600; color: var(--text-ter); text-transform: uppercase; letter-spacing: .06em; margin: 1.5rem 0 .6rem; padding: 0 .5rem; }
  .sidebar-label:first-child { margin-top: 0; }
  .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 10px; border: none; background: none; cursor: pointer; font-size: 15px; color: var(--text-sec); text-align: left; transition: background .12s, color .12s; }
  .nav-btn:hover { background: var(--bg-sec); color: var(--text); }
  .nav-btn.active { background: var(--purple-50); color: var(--purple-800); font-weight: 500; }
  .nav-btn .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-P { background: var(--purple-600); }
  .dot-D1 { background: var(--teal-600); }
  .dot-D2 { background: var(--teal-800); }
  .dot-R { background: #BA7517; }
  .dot-O { background: var(--blue-600); }
  .dot-phase1 { background: #7F77DD; }
  .dot-phase2 { background: #1D9E75; }
  .dot-phase3 { background: #BA7517; }

  /* ── Search bar ── */
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { width: 100%; padding: 11px 14px 11px 40px; border-radius: var(--radius); border: 0.5px solid var(--border-sec); background: var(--bg); font-size: 16px; color: var(--text); outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--purple-600); }
  .search-wrap .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text-ter); }

  /* ── Mobile top nav ── */
  .mobile-nav { display: none; background: var(--bg); border-bottom: 0.5px solid var(--border); position: sticky; top: 64px; z-index: 100; }
  .mobile-search { padding: .875rem 1rem .5rem; }
  .mobile-search input { width: 100%; padding: 12px 16px; border-radius: var(--radius); border: 0.5px solid var(--border-sec); background: var(--bg-sec); font-size: 17px; color: var(--text); outline: none; }
  .mobile-search input:focus { border-color: var(--purple-600); background: var(--bg); }
  .mobile-prompt { font-size: 18px; font-weight: 500; color: var(--text); padding: .75rem 1rem .5rem; }
  .mobile-tabs { display: flex; overflow-x: auto; padding: .5rem 1rem .75rem; gap: 8px; scrollbar-width: none; -ms-overflow-style: none; }
  .mobile-tabs::-webkit-scrollbar { display: none; }
  .mobile-tab { flex-shrink: 0; padding: 10px 18px; border-radius: 24px; border: 1.5px solid var(--border-sec); background: var(--bg); font-size: 15px; color: var(--text-sec); cursor: pointer; white-space: nowrap; transition: all .15s; font-weight: 400; }
  .mobile-tab.active { background: var(--purple-600); color: #fff; border-color: var(--purple-600); font-weight: 500; }
  .mobile-sub-tabs { display: none; overflow-x: auto; padding: 0 1rem .75rem; gap: 8px; scrollbar-width: none; -ms-overflow-style: none; }
  .mobile-sub-tabs::-webkit-scrollbar { display: none; }
  .mobile-sub-tabs.show { display: flex; }
  .mobile-sub-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-sec); font-size: 14px; color: var(--text-sec); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .mobile-sub-tab.active { background: var(--purple-50); color: var(--purple-800); border-color: var(--purple-200); font-weight: 500; }

  /* ── Main ── */
  main { padding: 1.5rem; }

  .view-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .view-title { font-size: 20px; font-weight: 500; }
  .view-count { font-size: 14px; color: var(--text-ter); background: var(--bg-sec); padding: 3px 12px; border-radius: 20px; }

  .section-group { margin-bottom: 1.75rem; }
  .section-head { font-size: 14px; font-weight: 600; color: var(--text-sec); padding: .6rem 0; margin-bottom: .75rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .section-head .color-bar { width: 4px; height: 16px; border-radius: 2px; flex-shrink: 0; }

  /* ── Doc cards ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .doc-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; transition: border-color .15s, box-shadow .15s; position: relative; }
  .doc-card:hover { border-color: var(--purple-200); box-shadow: var(--shadow); }
  .doc-card.has-link { cursor: pointer; }
  .doc-card.has-link:hover .card-name { color: var(--purple-800); }
  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .tier-pill { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .tier-M { background: var(--purple-50); color: var(--purple-800); }
  .tier-P { background: var(--teal-50); color: var(--teal-800); }
  .tier-S { background: var(--amber-50); color: var(--amber-800); }
  .tier-QR { background: var(--blue-50); color: var(--blue-800); }
  .tier-F { background: var(--pink-50); color: var(--pink-800); }
  .card-name { font-size: 15px; line-height: 1.5; color: var(--text); flex: 1; transition: color .15s; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .meta-tag { font-size: 13px; padding: 3px 9px; border-radius: 8px; background: var(--bg-sec); color: var(--text-sec); }
  .link-icon { position: absolute; top: 12px; right: 12px; font-size: 18px; color: var(--purple-600); opacity: 0; transition: opacity .15s; }
  .doc-card.has-link:hover .link-icon { opacity: 1; }

  /* ── Legend ── */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-sec); }
  .legend-pill { font-size: 12px; padding: 2px 9px; border-radius: 8px; }

  /* ── AI Chat ── */
  .chat-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 2rem; }
  .chat-title { font-size: 17px; font-weight: 500; color: var(--text-sec); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .quick-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .quick-chip { font-size: 14px; padding: 8px 14px; border-radius: 20px; border: 0.5px solid var(--border-sec); background: var(--bg); color: var(--text-sec); cursor: pointer; transition: all .12s; }
  .quick-chip:hover { border-color: var(--purple-600); color: var(--purple-800); background: var(--purple-50); }
  .chat-row { display: flex; gap: 10px; }
  .chat-row input { flex: 1; padding: 13px 16px; border-radius: var(--radius); border: 0.5px solid var(--border-sec); font-size: 16px; color: var(--text); background: var(--bg); outline: none; transition: border-color .15s; }
  .chat-row input:focus { border-color: var(--purple-600); }
  .chat-row button { padding: 13px 22px; border-radius: var(--radius); background: var(--purple-600); color: #fff; border: none; font-size: 16px; cursor: pointer; transition: background .15s; white-space: nowrap; }
  .chat-row button:hover { background: var(--purple-800); }

  /* ── Empty ── */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-ter); font-size: 16px; }

  /* ── Config note ── */
  .config-note { font-size: 14px; color: var(--text-ter); background: var(--amber-50); border: 0.5px solid #FAC775; border-radius: 10px; padding: .75rem 1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }

  /* ════════════════════════
     RWD — 手機版 (≤768px)
  ════════════════════════ */
  @media (max-width: 768px) {
    body { font-size: 17px; }
    header { padding: .875rem 1rem; }
    header .logo { font-size: 18px; }
    header .logo span { display: none; }
    header .badge { font-size: 12px; padding: 3px 10px; }

    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 1rem; }
    .mobile-nav { display: block; }

    .view-title { font-size: 18px; }
    .cards-grid { grid-template-columns: 1fr; gap: 10px; }
    .card-name { font-size: 15px; }
    .meta-tag { font-size: 13px; }
    .tier-pill { font-size: 12px; }

    .chat-panel { padding: 1.125rem; }
    .chat-title { font-size: 16px; }
    .quick-chip { font-size: 14px; padding: 8px 13px; }
    .chat-row { flex-direction: column; }
    .chat-row input { font-size: 16px; padding: 14px 16px; }
    .chat-row button { font-size: 16px; padding: 14px; border-radius: var(--radius); }

    .legend { gap: 8px; }
    .legend-item { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">WorkLink <span>沃領客 TTQS 智慧知識庫</span></div>
  <div class="badge">評核版 v1.0</div>
</header>

<!-- ── 手機版頂部導覽 ── -->
<div class="mobile-nav">
  <div class="mobile-search">
    <input type="text" id="mobileSearch" placeholder="🔍 搜尋文件名稱或關鍵字..." oninput="handleSearch(this.value)">
  </div>
  <div class="mobile-prompt">您想要用哪一種方式搜尋表單呢？</div>
  <div class="mobile-tabs" id="mobileTabs">
    <div class="mobile-tab active" onclick="setMobileMode('phase')" id="mtab-phase">📋 課程階段</div>
    <div class="mobile-tab" onclick="setMobileMode('pddro')" id="mtab-pddro">🔄 PDDRO</div>
    <div class="mobile-tab" onclick="setMobileMode('indicator')" id="mtab-indicator">📌 TTQS指標</div>
    <div class="mobile-tab" onclick="setMobileMode('tier')" id="mtab-tier">📂 四階文件</div>
  </div>
  <div class="mobile-sub-tabs show" id="mobileSubTabs"></div>
</div>

<div class="layout">
  <!-- ── 桌機側邊欄 ── -->
  <aside>
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="sideSearch" placeholder="搜尋文件..." oninput="handleSearch(this.value)">
    </div>

    <div class="sidebar-label">課程階段</div>
    <button class="nav-btn active" onclick="setView('phase','all')" id="nav-phase-all">
      <span class="dot" style="background:var(--purple-200)"></span> 全部文件
    </button>
    <button class="nav-btn" onclick="setView('phase','課前')" id="nav-phase-課前">
      <span class="dot dot-phase1"></span> 課前作業
    </button>
    <button class="nav-btn" onclick="setView('phase','課中')" id="nav-phase-課中">
      <span class="dot dot-phase2"></span> 課中執行
    </button>
    <button class="nav-btn" onclick="setView('phase','課後')" id="nav-phase-課後">
      <span class="dot dot-phase3"></span> 課後查核
    </button>

    <div class="sidebar-label">PDDRO 循環</div>
    <button class="nav-btn" onclick="setView('pddro','P')" id="nav-pddro-P">
      <span class="dot dot-P"></span> P 計畫 Plan
    </button>
    <button class="nav-btn" onclick="setView('pddro','D設計')" id="nav-pddro-D設計">
      <span class="dot dot-D1"></span> D 設計 Design
    </button>
    <button class="nav-btn" onclick="setView('pddro','D執行')" id="nav-pddro-D執行">
      <span class="dot dot-D2"></span> D 執行 Do
    </button>
    <button class="nav-btn" onclick="setView('pddro','R')" id="nav-pddro-R">
      <span class="dot dot-R"></span> R 查核 Review
    </button>
    <button class="nav-btn" onclick="setView('pddro','O')" id="nav-pddro-O">
      <span class="dot dot-O"></span> O 成果 Outcome
    </button>

    <div class="sidebar-label">TTQS 指標</div>
    <button class="nav-btn" onclick="setView('indicator','P')" id="nav-ind-P" style="font-weight:500;color:var(--purple-800)">【P】計畫 指標 01–06</button>
    <button class="nav-btn" onclick="setView('indicator','D')" id="nav-ind-D" style="font-weight:500;color:var(--teal-800)">【D】設計+執行 07–14</button>
    <button class="nav-btn" onclick="setView('indicator','R')" id="nav-ind-R" style="font-weight:500;color:var(--amber-600)">【R】查核 指標 15–16</button>
    <button class="nav-btn" onclick="setView('indicator','O')" id="nav-ind-O" style="font-weight:500;color:var(--blue-800)">【O】成果 指標 17–19</button>

    <div class="sidebar-label">四階文件</div>
    <button class="nav-btn" onclick="setView('tier','M')" id="nav-tier-M">
      <span class="tier-pill tier-M">手冊</span> 第一階
    </button>
    <button class="nav-btn" onclick="setView('tier','P')" id="nav-tier-P">
      <span class="tier-pill tier-P">程序</span> 第二階
    </button>
    <button class="nav-btn" onclick="setView('tier','S')" id="nav-tier-S">
      <span class="tier-pill tier-S">辦法</span> 第三階
    </button>
    <button class="nav-btn" onclick="setView('tier','QR')" id="nav-tier-QR">
      <span class="tier-pill tier-QR">佐證</span> 第四階
    </button>
    <button class="nav-btn" onclick="setView('tier','F')" id="nav-tier-F">
      <span class="tier-pill tier-F">表單</span> 附件
    </button>
  </aside>

  <!-- ── 主內容 ── -->
  <main>
    <div class="config-note" id="configNote" style="display:none">
      💡 <span>文件連結尚未設定：請在原始碼頂部的 DRIVE_LINKS 區塊填入 Google Drive 網址。</span>
    </div>

    <div class="view-header">
      <div class="view-title" id="viewTitle">全部文件</div>
      <div class="view-count" id="viewCount"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-pill tier-M">手冊</span> 第一階</div>
      <div class="legend-item"><span class="legend-pill tier-P">程序</span> 第二階</div>
      <div class="legend-item"><span class="legend-pill tier-S">辦法</span> 第三階</div>
      <div class="legend-item"><span class="legend-pill tier-QR">佐證</span> 第四階</div>
      <div class="legend-item"><span class="legend-pill tier-F">表單</span> 附件</div>
    </div>

    <div id="docArea"></div>

    <!-- ── AI 智慧小幫手 ── -->
    <div class="chat-panel">
      <div class="chat-title">🤖 智慧小幫手 — 直接提問找文件</div>
      <div class="quick-row">
        <div class="quick-chip" onclick="askClaude('課後我要填什麼表？')">課後要填什麼表？</div>
        <div class="quick-chip" onclick="askClaude('課前需要準備哪些文件？')">課前要準備什麼？</div>
        <div class="quick-chip" onclick="askClaude('指標16異常矯正需要哪些佐證？')">指標16需要什麼佐證？</div>
        <div class="quick-chip" onclick="askClaude('CAPA計畫相關文件有哪些？')">CAPA相關文件？</div>
        <div class="quick-chip" onclick="askClaude('師資遴選要看哪個文件？')">師資遴選文件？</div>
        <div class="quick-chip" onclick="askClaude('新進同仁第一天要看什麼？')">新進同仁指引？</div>
      </div>
      <div class="chat-row">
        <input type="text" id="chatInput" placeholder="直接提問，例如：課後要填什麼表？" onkeydown="if(event.key==='Enter') askClaude()">
        <button onclick="askClaude()">問 AI ↗</button>
      </div>
    </div>
  </main>
</div>

<script>
const DRIVE_LINKS = {
  'WL-M-00-01': 'https://drive.google.com/open?id=1dLYle3MuwuocI_Sqly2Xc6MjJYbFCdZD&usp=drive_copy',
  'WL-P-01-01': 'https://drive.google.com/open?id=1ukPDHV4L63ywSBhOY5f8-qGSlJ_Xn6eK&usp=drive_copy',
  'WL-P-02-01': 'https://drive.google.com/open?id=1kBn0Rw5RlJkCC7vtv4Hff-sQJmtlSSh6&usp=drive_copy',
  'WL-P-03-01': 'https://drive.google.com/open?id=1znXt0Rn2wJ1gQgK4uhpFRGojkVl7rJc2&usp=drive_copy',
  'WL-P-04-01': 'https://drive.google.com/open?id=18LP21xlDLW-9yqmnHDBphEWvxAvZtsAx&usp=drive_copy',
  'WL-S-01-01': 'https://drive.google.com/open?id=1r15lAtxEy-klTxDBOuqbF32A8m43JOE4&usp=drive_copy',
  'WL-S-02-01': 'https://drive.google.com/open?id=1sW2inhT5Y476fAcj8_XIyTxSQVjGWKlr&usp=drive_copy',
  'WL-S-02-02': 'https://drive.google.com/open?id=1xhI-qYPleAAv1Y3iCXHA5NDw70Hfft4S&usp=drive_copy',
  'WL-S-03-01': 'https://drive.google.com/open?id=1Q17fCeGK6ru8XL8tt0a7Ie6BeO4tbO2K&usp=drive_copy',
  'WL-S-03-02': 'https://drive.google.com/open?id=1uC8wtw3KUxmZGZyifBVWjIlQdy9BgHv6&usp=drive_copy',
  'WL-S-04-01': 'https://drive.google.com/open?id=1mawlDz8xQpHUzJtdS9r9ydIqbrEAGiQu&usp=drive_copy',
  'WL-S-05-01': 'https://drive.google.com/open?id=1NmvdTJ5wxMLxROp8UuGzE08fW3BQsnez&usp=drive_copy',
  'WL-S-05-02': 'https://drive.google.com/open?id=1L4K2A7VDL9yBOgrzR-8XhuoGtwn6Kjlq&usp=drive_copy',
  'WL-S-05-03': 'https://drive.google.com/open?id=11GayzRY0_7RkSVg2eTlV1yKO2j_lHIHS&usp=drive_copy',
  'WL-QR-01-01': 'https://drive.google.com/open?id=1AmgIVeKMr4paaa7hA6KWoXwSQqp3GW_-&usp=drive_copy',
  'WL-QR-01-02': 'https://drive.google.com/open?id=1dUyuDq5bxNHQFuBa-CUM5LSp7SjATnpA&usp=drive_copy',
  'WL-QR-01-03': 'https://drive.google.com/open?id=1UkAU-JYtHROenT6VBauBVrG7oJs5sPjl&usp=drive_copy',
  'WL-QR-01-04': 'https://drive.google.com/open?id=1cOqB-fFX5qgiaeBBLbDblLJOxh6yA5EQ&usp=drive_copy',
  'WL-QR-01-05': 'https://drive.google.com/open?id=1TjZvFji1jDsDTOAOYLQNG4nei94ImTWX&usp=drive_copy',
  'WL-QR-01-06': 'https://drive.google.com/open?id=1K_G1ix8AkpFb360NdjrOYcVSJoGp9MyM&usp=drive_copy',
  'WL-QR-01-07': 'https://drive.google.com/open?id=1aVtDs4CDfX2rrk3Wr-gSrBSyo1JnrKY7&usp=drive_copy',
  'WL-QR-01-08': 'https://drive.google.com/open?id=1KUAqFyBHgPHWW8qSPWLa2Ihx8KJbSz0i&usp=drive_copy',

let currentView = {type:'phase', value:'all'};
let mobileMode = 'phase';
let searchQ = '';

function hasLink(id) { return !!(DRIVE_LINKS[id] && DRIVE_LINKS[id].trim()); }

function openDoc(id) {
  const url = DRIVE_LINKS[id];
  if (url) window.open(url, '_blank');
}

function cardHTML(doc) {
  const link = hasLink(doc.id);
  const indStr = doc.ind.slice(0,4).map(i=>'指標'+i).join('、') + (doc.ind.length>4?' …':'');
  const phaseStr = doc.phase.join(' · ');
  return `<div class="doc-card${link?' has-link':''}" ${link?`onclick="openDoc('${doc.id}')"`:''}>
    ${link?'<span class="link-icon">↗</span>':''}
    <div class="card-top">
      <span class="tier-pill tier-${doc.tier}">${TIER_LABELS[doc.tier]}</span>
      <span class="card-name">${doc.id} — ${doc.name}</span>
    </div>
    <div class="card-meta">
      <span class="meta-tag">📋 ${phaseStr}</span>
      <span class="meta-tag">📌 ${indStr}</span>
    </div>
  </div>`;
}

function groupRender(groups) {
  return groups.map(({label, color, docs}) => {
    if (!docs.length) return '';
    return `<div class="section-group">
      <div class="section-head">
        <div class="color-bar" style="background:${color}"></div>
        ${label} <span style="font-weight:400;margin-left:4px">(${docs.length} 份)</span>
      </div>
      <div class="cards-grid">${docs.map(cardHTML).join('')}</div>
    </div>`;
  }).join('');
}

function applySearch(list) {
  if (!searchQ) return list;
  const q = searchQ.toLowerCase();
  return list.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.id.toLowerCase().includes(q) ||
    d.ind.some(i => String(i)===q || ('指標'+i).includes(q)) ||
    d.phase.some(p => p.includes(q)) ||
    d.pddro.some(s => s.toLowerCase().includes(q)) ||
    (TIER_LABELS[d.tier]||'').includes(q)
  );
}

function render() {
  const {type, value} = currentView;
  let filtered = applySearch(DOCS);
  let title = '全部文件';
  let html = '';

  if (type === 'phase') {
    if (value === 'all') {
      title = '全部文件';
      html = groupRender([
        {label:'📋 課前作業', color:'#7F77DD', docs: filtered.filter(d=>d.phase.includes('課前'))},
        {label:'🎓 課中執行', color:'#1D9E75', docs: filtered.filter(d=>d.phase.includes('課中'))},
        {label:'📊 課後查核', color:'#BA7517', docs: filtered.filter(d=>d.phase.includes('課後'))},
      ]);
    } else {
      filtered = filtered.filter(d=>d.phase.includes(value));
      title = {課前:'📋 課前作業', 課中:'🎓 課中執行', 課後:'📊 課後查核'}[value];
      html = `<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
    }
  } else if (type === 'pddro') {
    filtered = filtered.filter(d=>d.pddro.includes(value));
    title = {P:'P 計畫 Plan', D設計:'D 設計 Design', D執行:'D 執行 Do', R:'R 查核 Review', O:'O 成果 Outcome'}[value];
    html = `<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
  } else if (type === 'indicator') {
    const ranges = {P:[1,2,3,4,5,6], D:[7,8,9,10,11,12,13,14], R:[15,16], O:[17,18,19]};
    const colors = {P:'#534AB7', D:'#1D9E75', R:'#BA7517', O:'#185FA5'};
    title = {P:'【P 計畫】指標 01–06', D:'【D 設計+執行】指標 07–14', R:'【R 查核】指標 15–16', O:'【O 成果】指標 17–19'}[value];
    html = groupRender((ranges[value]||[]).map(i=>({
      label:`指標 ${String(i).padStart(2,'0')} — ${IND_NAMES[i]}`,
      color: colors[value],
      docs: filtered.filter(d=>d.ind.includes(i))
    })));
  } else if (type === 'tier') {
    filtered = filtered.filter(d=>d.tier===value);
    title = {M:'第一階 手冊', P:'第二階 程序', S:'第三階 管理辦法', QR:'第四階 佐證紀錄', F:'附件 表單'}[value];
    html = `<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
  }

  if (searchQ) title = `搜尋：「${searchQ}」`;
  const count = filtered.length || (html.match(/doc-card/g)||[]).length;

  document.getElementById('viewTitle').textContent = title;
  document.getElementById('viewCount').textContent = `${DOCS.filter(d=>{
    const q=searchQ.toLowerCase();
    if(!q)return true;
    return d.name.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)||d.ind.some(i=>String(i)===q||('指標'+i).includes(q))||d.phase.some(p=>p.includes(q))||d.pddro.some(s=>s.toLowerCase().includes(q))||(TIER_LABELS[d.tier]||'').includes(q);
  }).length} 份文件`;
  document.getElementById('docArea').innerHTML = html || `<div class="empty">找不到符合條件的文件，請換個關鍵字。</div>`;
}

function setView(type, value) {
  currentView = {type, value};
  searchQ = '';
  document.getElementById('sideSearch').value = '';
  document.getElementById('mobileSearch').value = '';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const keyMap = {phase:`nav-phase-${value}`, pddro:`nav-pddro-${value}`, indicator:`nav-ind-${value}`, tier:`nav-tier-${value}`};
  const btn = document.getElementById(keyMap[type]);
  if (btn) btn.classList.add('active');
  render();
}

function setMobileMode(mode) {
  mobileMode = mode;
  document.querySelectorAll('.mobile-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('mtab-'+mode).classList.add('active');
  const subs = MOBILE_SUB[mode];
  const subEl = document.getElementById('mobileSubTabs');
  subEl.className = 'mobile-sub-tabs show';
  subEl.innerHTML = subs.map(s=>
    `<div class="mobile-sub-tab" onclick="setMobileSub('${mode}','${s.v}')" id="msub-${mode}-${s.v.replace(/\s/g,'')}">${s.l}</div>`
  ).join('');
  // 自動選第一個
  const first = subs[0];
  setMobileSub(mode, first.v);
}

function setMobileSub(mode, val) {
  document.querySelectorAll('.mobile-sub-tab').forEach(t=>t.classList.remove('active'));
  const el = document.getElementById(`msub-${mode}-${val.replace(/\s/g,'')}`);
  if (el) el.classList.add('active');
  const typeMap = {phase:'phase', pddro:'pddro', indicator:'indicator', tier:'tier'};
  setView(typeMap[mode], val);
}

function handleSearch(val) {
  searchQ = val.trim();
  currentView = {type:'phase', value:'all'};
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('nav-phase-all');
  if (btn) btn.classList.add('active');
  render();
}

function askClaude(q) {
  const input = document.getElementById('chatInput');
  const query = q || input.value.trim();
  if (!query) return;
  const context = `你是 WorkLink 沃領客的 TTQS 內部知識庫助理。請根據以下問題，找出相關的文件、表單，並說明在哪個 TTQS 指標與課程階段（課前/課中/課後）需要用到。問題：${query}`;
  window.open('https://claude.ai/new?q=' + encodeURIComponent(context), '_blank');
}

// 初始化手機子選單
setMobileMode('phase');
// 同步桌機預設選中
document.getElementById('nav-phase-all').classList.add('active');
render();
</script>
</body>
</html>
